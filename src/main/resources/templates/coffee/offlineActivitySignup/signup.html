<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('报名名单')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <input type="hidden" name="activityId" th:value="${activityId}">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>预约状态：</label>
                            <select name="status">
                                <option value="">全部</option>
                                <option value="0">已预约</option>
                                <option value="1">已取消</option>
                                <option value="2">已到店</option>
                                <option value="3">未到店</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('coffee:offlineActivity:edit')}]];
    var prefix = ctx + "coffee/offlineActivitySignup";

    $(function() {
        var options = {
            url: prefix + "/list",
            modalName: "报名名单",
            columns: [{
                field: 'signupId',
                title: '预约ID',
                visible: false
            },
            {
                field: 'avatar',
                title: '头像',
                formatter: function(value) {
                    return value ? '<img src="' + value + '" style="width:42px;height:42px;border-radius:50%;object-fit:cover;" />' : '-';
                }
            },
            {
                field: 'nickname',
                title: '微信昵称',
                formatter: function(value, row) {
                    return value || ('用户' + row.userId);
                }
            },
            {
                field: 'userId',
                title: '用户ID'
            },
            {
                field: 'signupTime',
                title: '预约时间'
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    if (value === 0) return '<span class="badge badge-primary">已预约</span>';
                    if (value === 1) return '<span class="badge badge-default">已取消</span>';
                    if (value === 2) return '<span class="badge badge-success">已到店</span>';
                    if (value === 3) return '<span class="badge badge-warning">未到店</span>';
                    return '-';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    if (row.status !== 0) {
                        return '-';
                    }
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="markStatus(\'' + row.signupId + '\', 2)"><i class="fa fa-check"></i>已到店</a> ');
                    actions.push('<a class="btn btn-warning btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="markStatus(\'' + row.signupId + '\', 3)"><i class="fa fa-close"></i>未到店</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function markStatus(signupId, status) {
        $.operate.post(prefix + "/mark", { signupId: signupId, status: status });
    }
</script>
</body>
</html>
