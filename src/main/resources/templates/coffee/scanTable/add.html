<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增桌台二维码')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-scanTable-add">
        <input name="tableId" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">门店ID：</label>
            <div class="col-sm-8">
                <input name="shopId" class="form-control" type="number" min="1" step="1" value="1" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">门店名称：</label>
            <div class="col-sm-8">
                <input name="shopName" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">桌号：</label>
            <div class="col-sm-8">
                <input name="tableNo" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">场景：</label>
            <div class="col-sm-8">
                <select name="scene" class="form-control m-b">
                    <option value="dine_in" selected>堂食</option>
                    <option value="take_out">外带</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">二维码地址：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input name="qrUrl" class="form-control" type="text" placeholder="填写门店和桌号后点击生成">
                    <span class="input-group-btn">
                        <button type="button" class="btn btn-primary" onclick="generateQrcode()">
                            <i class="fa fa-qrcode"></i> 生成二维码
                        </button>
                    </span>
                </div>
                <span class="help-block m-b-none">生成后会自动回填二维码地址，并绑定当前新增记录。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control m-b">
                    <option value="1" selected>启用</option>
                    <option value="0">停用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "coffee/scanTable";
    var qrcodeApiPrefix = ctx + "api/scanTableQrcode";
    $("#form-scanTable-add").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            var tableId = $('[name="tableId"]').val();
            var url = tableId ? prefix + "/edit" : prefix + "/add";
            $.operate.save(url, $('#form-scanTable-add').serialize());
        }
    }

    function generateQrcode() {
        if (!$.validate.form()) {
            return;
        }
        var data = formDataToObject();
        $.ajax({
            url: qrcodeApiPrefix + '/generate',
            type: 'post',
            dataType: 'json',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify(data),
            beforeSend: function() {
                $.modal.loading('正在生成二维码，请稍候...');
            },
            success: function(result) {
                if (result.code == web_status.SUCCESS && result.data) {
                    $('[name="tableId"]').val(result.data.tableId || '');
                    $('[name="qrUrl"]').val(result.data.qrUrl || '');
                    $.modal.msgSuccess(result.msg || '生成成功');
                } else if (result.code == web_status.WARNING) {
                    $.modal.alertWarning(result.msg);
                } else {
                    $.modal.alertError(result.msg || '生成失败');
                }
            },
            error: function() {
                $.modal.alertError('生成失败，请稍后重试');
            },
            complete: function() {
                $.modal.closeLoading();
            }
        });
    }

    function formDataToObject() {
        var data = {};
        $('#form-scanTable-add').serializeArray().forEach(function(item) {
            var value = $.trim(item.value || '');
            if (value !== '') {
                data[item.name] = value;
            }
        });
        return data;
    }
</script>
</body>
</html>
