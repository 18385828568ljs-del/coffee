<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('桌台二维码列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>门店ID：</label>
                            <input type="text" name="shopId"/>
                        </li>
                        <li>
                            <label>桌号：</label>
                            <input type="text" name="tableNo"/>
                        </li>
                        <li>
                            <label>场景：</label>
                            <select name="scene">
                                <option value="">全部</option>
                                <option value="dine_in">堂食</option>
                                <option value="take_out">外带</option>
                            </select>
                        </li>
                        <li>
                            <label>状态：</label>
                            <select name="status">
                                <option value="">全部</option>
                                <option value="1">启用</option>
                                <option value="0">停用</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="coffee:scanTable:add">
                <i class="fa fa-plus"></i> 添加
            </a>
            <a class="btn btn-warning" onclick="openBatchGenerateModal()" shiro:hasPermission="coffee:scanTable:add">
                <i class="fa fa-object-group"></i> 批量生成
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="coffee:scanTable:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="coffee:scanTable:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('coffee:scanTable:edit')}]];
    var removeFlag = [[${@permission.hasPermi('coffee:scanTable:remove')}]];
    var prefix = ctx + "coffee/scanTable";
    var qrcodeApiPrefix = ctx + "api/scanTableQrcode";

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "桌台二维码",
            columns: [{
                checkbox: true
            },
            {
                field: 'tableId',
                title: '桌台ID',
                visible: false
            },
            {
                field: 'shopId',
                title: '门店ID'
            },
            {
                field: 'shopName',
                title: '门店名称',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'tableNo',
                title: '桌号'
            },
            {
                field: 'scene',
                title: '场景',
                formatter: function(value) {
                    if (value === 'dine_in') {
                        return '堂食';
                    }
                    if (value === 'take_out') {
                        return '外带';
                    }
                    return value || '-';
                }
            },
            {
                field: 'qrUrl',
                title: '二维码',
                formatter: function(value) {
                    if (!value) {
                        return '-';
                    }
                    return '<a href="' + value + '" target="_blank">查看二维码</a>';
                }
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    return String(value) === '1'
                        ? '<span class="label label-primary">启用</span>'
                        : '<span class="label label-default">停用</span>';
                }
            },
            {
                field: 'remark',
                title: '备注',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-info btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="generateRowQrcode(\'' + row.tableId + '\')"><i class="fa fa-qrcode"></i>生成二维码</a> ');
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.tableId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.tableId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function openBatchGenerateModal() {
        layer.open({
            type: 1,
            title: '批量生成桌台二维码',
            area: ['560px', '560px'],
            btn: ['批量生成', '取消'],
            content: buildBatchGenerateForm(),
            yes: function(index) {
                batchGenerateQrcode(index);
            }
        });
    }

    function buildBatchGenerateForm() {
        return '<form id="batchGenerateQrcodeForm" class="form-horizontal" style="padding: 20px 30px 0 10px;">'
            + '<div class="form-group"><label class="col-sm-3 control-label">门店ID：</label><div class="col-sm-8"><input name="shopId" class="form-control" type="number" placeholder="默认 1"></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">门店名称：</label><div class="col-sm-8"><input name="shopName" class="form-control" type="text" placeholder="选填"></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">桌号列表：</label><div class="col-sm-8"><textarea name="tableNos" class="form-control" rows="4" placeholder="可选。多个桌号用逗号、空格或换行分隔，例如 A01,A02,A03"></textarea></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">桌号前缀：</label><div class="col-sm-8"><input name="prefix" class="form-control" type="text" placeholder="列表为空时使用，例如 A"></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">起止编号：</label><div class="col-sm-4"><input name="start" class="form-control" type="number" placeholder="起始，例如 1"></div><div class="col-sm-4"><input name="end" class="form-control" type="number" placeholder="结束，例如 10"></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">编号位数：</label><div class="col-sm-8"><input name="digits" class="form-control" type="number" placeholder="默认 2，例如 01"></div></div>'
            + '<div class="form-group"><label class="col-sm-3 control-label">场景：</label><div class="col-sm-8"><select name="scene" class="form-control"><option value="dine_in">堂食</option><option value="take_out">外带</option></select></div></div>'
            + '<div class="form-group"><div class="col-sm-offset-3 col-sm-8"><span class="help-block m-b-none">优先使用桌号列表；列表为空时，使用前缀 + 起止编号批量生成。</span></div></div>'
            + '</form>';
    }

    function batchGenerateQrcode(index) {
        var data = formDataToObject('batchGenerateQrcodeForm');
        if (data.tableNos) {
            data.tableNos = data.tableNos.split(/[\s,，]+/).filter(function(item) {
                return item;
            });
        }
        if (!data.tableNos || data.tableNos.length === 0) {
            if (!data.start || !data.end) {
                $.modal.alertWarning('请填写桌号列表，或填写起止编号');
                return;
            }
        }
        postQrcode(qrcodeApiPrefix + '/batchGenerate', data, index);
    }

    function generateRowQrcode(tableId) {
        var row = $('#bootstrap-table').bootstrapTable('getRowByUniqueId', tableId);
        if (!row) {
            var rows = $('#bootstrap-table').bootstrapTable('getData');
            for (var i = 0; i < rows.length; i++) {
                if (String(rows[i].tableId) === String(tableId)) {
                    row = rows[i];
                    break;
                }
            }
        }
        if (!row) {
            $.modal.alertWarning('未找到当前桌台记录');
            return;
        }
        $.modal.confirm('确认重新生成桌号 ' + row.tableNo + ' 的二维码吗？', function() {
            postQrcode(qrcodeApiPrefix + '/generate', {
                shopId: row.shopId,
                shopName: row.shopName,
                tableNo: row.tableNo,
                scene: row.scene
            });
        });
    }

    function formDataToObject(formId) {
        var data = {};
        $('#' + formId).serializeArray().forEach(function(item) {
            var value = $.trim(item.value || '');
            if (value !== '') {
                data[item.name] = value;
            }
        });
        return data;
    }

    function postQrcode(url, data, layerIndex) {
        $.ajax({
            url: url,
            type: 'post',
            dataType: 'json',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify(data),
            beforeSend: function() {
                $.modal.loading('正在生成二维码，请稍候...');
            },
            success: function(result) {
                if (result.code == web_status.SUCCESS) {
                    if (layerIndex) {
                        layer.close(layerIndex);
                    }
                    $.modal.msgSuccess(result.msg || '生成成功');
                    $.table.refresh();
                } else if (result.code == web_status.WARNING) {
                    $.modal.alertWarning(result.msg);
                } else {
                    $.modal.alertError(result.msg || '生成失败');
                }
            },
            error: function() {
                $.modal.alertError('生成失败，请稍后重试');
            },
            complete: function() {
                $.modal.closeLoading();
            }
        });
    }
</script>
</body>
</html>
