<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改桌台二维码')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-scanTable-edit" th:object="${scanTable}">
        <input name="tableId" th:field="*{tableId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">门店ID：</label>
            <div class="col-sm-8">
                <input name="shopId" th:field="*{shopId}" class="form-control" type="number" min="1" step="1" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">门店名称：</label>
            <div class="col-sm-8">
                <input name="shopName" th:field="*{shopName}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">桌号：</label>
            <div class="col-sm-8">
                <input name="tableNo" th:field="*{tableNo}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">场景：</label>
            <div class="col-sm-8">
                <select name="scene" class="form-control m-b">
                    <option value="dine_in" th:selected="${scanTable.scene == 'dine_in'}">堂食</option>
                    <option value="take_out" th:selected="${scanTable.scene == 'take_out'}">外带</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">二维码地址：</label>
            <div class="col-sm-8">
                <input name="qrUrl" th:field="*{qrUrl}" class="form-control" type="text" placeholder="如已有二维码图片地址可直接维护">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control m-b">
                    <option value="1" th:selected="${scanTable.status == 1}">启用</option>
                    <option value="0" th:selected="${scanTable.status == 0}">停用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "coffee/scanTable";
    $("#form-scanTable-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-scanTable-edit').serialize());
        }
    }
</script>
</body>
</html>
