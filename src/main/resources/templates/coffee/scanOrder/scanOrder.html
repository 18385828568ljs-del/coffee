<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('点单订单列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>用户ID：</label>
                            <input type="text" name="userId"/>
                        </li>
                        <li>
                            <label>门店ID：</label>
                            <input type="text" name="shopId"/>
                        </li>
                        <li>
                            <label>桌号：</label>
                            <input type="text" name="tableNo"/>
                        </li>
                        <li>
                            <label>订单状态：</label>
                            <select name="status">
                                <option value="">全部</option>
                                <option value="0">待支付</option>
                                <option value="1">已支付/制作中</option>
                                <option value="2">已完成</option>
                                <option value="3">已取消</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var detailFlag = [[${@permission.hasAnyPermi('coffee:scanOrder:detail,coffee:scanOrder:view')}]];
    var prefix = ctx + "coffee/scanOrder";

    function formatMoney(value) {
        return value == null ? '0.00' : value;
    }

    $(function() {
        var options = {
            url: prefix + "/list",
            detailUrl: prefix + "/detail/{id}",
            modalName: "点单订单",
            columns: [{
                checkbox: true
            },
            {
                field: 'orderId',
                title: '订单ID'
            },
            {
                field: 'orderNo',
                title: '订单号',
                width: 180
            },
            {
                field: 'userId',
                title: '用户ID'
            },
            {
                field: 'shopId',
                title: '门店ID'
            },
            {
                field: 'tableNo',
                title: '桌号',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'totalAmount',
                title: '订单总金额',
                formatter: function(value) {
                    return formatMoney(value);
                }
            },
            {
                field: 'payAmount',
                title: '实付金额',
                formatter: function(value) {
                    return formatMoney(value);
                }
            },
            {
                field: 'payStatus',
                title: '支付状态',
                formatter: function(value) {
                    return String(value) === '1'
                        ? '<span class="label label-primary">已支付</span>'
                        : '<span class="label label-default">未支付</span>';
                }
            },
            {
                field: 'orderStatus',
                title: '订单状态',
                formatter: function(value) {
                    if (String(value) === '0') {
                        return '<span class="label label-warning">待支付</span>';
                    }
                    if (String(value) === '1') {
                        return '<span class="label label-info">已支付/制作中</span>';
                    }
                    if (String(value) === '2') {
                        return '<span class="label label-success">已完成</span>';
                    }
                    if (String(value) === '3') {
                        return '<span class="label label-default">已取消</span>';
                    }
                    return '-';
                }
            },
            {
                field: 'payTime',
                title: '支付时间',
                width: 160,
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'createTime',
                title: '创建时间',
                width: 160,
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'remark',
                title: '备注',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    return '<a class="btn btn-info btn-xs ' + detailFlag + '" href="javascript:void(0)" onclick="$.operate.detail(\'' + row.orderId + '\')"><i class="fa fa-search"></i>详情</a>';
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
