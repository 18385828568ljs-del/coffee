<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('点单工作台')" />
    <style>
        .order-workbench-tip {
            display: none;
            margin-bottom: 10px;
            padding: 10px 14px;
            border-radius: 4px;
            background: #fff3cd;
            color: #8a6d3b;
            border: 1px solid #ffe7a3;
            font-weight: 600;
        }
        .pickup-no {
            display: inline-block;
            min-width: 54px;
            padding: 4px 10px;
            border-radius: 16px;
            background: #1ab394;
            color: #fff;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .urge-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            background: #ed5565;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12">
            <div id="newOrderTip" class="order-workbench-tip">有新的点单订单，请及时制作。</div>
        </div>
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>用户ID：</label>
                            <input type="text" name="userId"/>
                        </li>
                        <li>
                            <label>门店ID：</label>
                            <input type="text" name="shopId"/>
                        </li>
                        <li>
                            <label>桌号：</label>
                            <input type="text" name="tableNo"/>
                        </li>
                        <li>
                            <label>订单状态：</label>
                            <select name="status">
                                <option value="">全部</option>
                                <option value="0">待支付</option>
                                <option value="2">制作中</option>
                                <option value="3">待取餐</option>
                                <option value="4">已完成</option>
                                <option value="5">已取消</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var detailFlag = [[${@permission.hasAnyPermi('coffee:scanOrder:detail,coffee:scanOrder:view')}]];
    var editFlag = [[${@permission.hasPermi('coffee:scanOrder:edit')}]];
    var prefix = ctx + "coffee/scanOrder";
    var knownMakingIds = {};
    var firstLoad = true;
    var refreshTimer = null;

    function formatMoney(value) {
        return value == null ? '0.00' : value;
    }

    function statusLabel(value) {
        var status = String(value);
        if (status === '0') return '<span class="label label-warning">待支付</span>';
        if (status === '2') return '<span class="label label-info">制作中</span>';
        if (status === '3') return '<span class="label label-primary">待取餐</span>';
        if (status === '4') return '<span class="label label-success">已完成</span>';
        if (status === '5') return '<span class="label label-default">已取消</span>';
        return '-';
    }

    function postAction(action, orderId, message) {
        $.modal.confirm(message, function() {
            $.operate.post(prefix + "/" + action, { orderId: orderId }, function() {
                $.table.refresh();
            });
        });
    }

    function notifyNewOrder(rows) {
        var nextKnown = {};
        var hasNew = false;
        $.each(rows || [], function(_, row) {
            if (String(row.orderStatus) === '2') {
                nextKnown[row.orderId] = true;
                if (!firstLoad && !knownMakingIds[row.orderId]) {
                    hasNew = true;
                }
            }
        });
        knownMakingIds = nextKnown;
        firstLoad = false;
        if (hasNew) {
            $('#newOrderTip').stop(true, true).fadeIn(120).delay(4500).fadeOut(500);
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var oscillator = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 880;
                gain.gain.value = 0.08;
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.22);
            } catch (e) {}
        }
    }

    $(function() {
        var options = {
            url: prefix + "/list",
            detailUrl: prefix + "/detail/{id}",
            modalName: "点单订单",
            onLoadSuccess: function(data) {
                notifyNewOrder(data.rows || []);
            },
            columns: [{
                checkbox: true
            },
            {
                field: 'orderId',
                title: '订单ID'
            },
            {
                field: 'orderNo',
                title: '订单号',
                width: 180
            },
            {
                field: 'pickupNo',
                title: '取餐号',
                formatter: function(value) {
                    return value ? '<span class="pickup-no">' + value + '</span>' : '-';
                }
            },
            {
                field: 'userId',
                title: '用户ID'
            },
            {
                field: 'shopId',
                title: '门店ID'
            },
            {
                field: 'tableNo',
                title: '桌号',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'totalAmount',
                title: '订单总金额',
                formatter: function(value) {
                    return formatMoney(value);
                }
            },
            {
                field: 'payAmount',
                title: '实付金额',
                formatter: function(value) {
                    return formatMoney(value);
                }
            },
            {
                field: 'estimatedWaitMinutes',
                title: '预计等待',
                formatter: function(value) {
                    return value ? value + ' 分钟' : '-';
                }
            },
            {
                field: 'urgeCount',
                title: '催单',
                formatter: function(value, row) {
                    var count = Number(value || 0);
                    if (count <= 0) return '-';
                    return '<span class="urge-badge">催 ' + count + ' 次</span><br><small>' + (row.lastUrgeTime || '') + '</small>';
                }
            },
            {
                field: 'payStatus',
                title: '支付状态',
                formatter: function(value) {
                    return String(value) === '1'
                        ? '<span class="label label-primary">已支付</span>'
                        : '<span class="label label-default">未支付</span>';
                }
            },
            {
                field: 'orderStatus',
                title: '订单状态',
                formatter: function(value) {
                    return statusLabel(value);
                }
            },
            {
                field: 'payTime',
                title: '支付时间',
                width: 160,
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'createTime',
                title: '创建时间',
                width: 160,
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                field: 'remark',
                title: '备注',
                formatter: function(value) {
                    return value || '-';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-info btn-xs ' + detailFlag + '" href="javascript:void(0)" onclick="$.operate.detail(\'' + row.orderId + '\')"><i class="fa fa-search"></i>详情</a>');
                    if (String(row.orderStatus) === '2') {
                        actions.push('<a class="btn btn-warning btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="postAction(\'call\', \'' + row.orderId + '\', \'确认叫号取餐吗？\')"><i class="fa fa-bullhorn"></i>叫号</a>');
                        actions.push('<a class="btn btn-danger btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="postAction(\'cancelPaid\', \'' + row.orderId + '\', \'确认取消该订单吗？\')"><i class="fa fa-close"></i>取消</a>');
                    }
                    if (String(row.orderStatus) === '3') {
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="postAction(\'complete\', \'' + row.orderId + '\', \'确认该订单已取餐完成吗？\')"><i class="fa fa-check-circle"></i>完成</a>');
                    }
                    return actions.join(' ');
                }
            }]
        };
        $.table.init(options);
        refreshTimer = setInterval(function() {
            $.table.refresh();
        }, 5000);
        $(window).on('beforeunload', function() {
            if (refreshTimer) clearInterval(refreshTimer);
        });
    });
</script>
</body>
</html>
