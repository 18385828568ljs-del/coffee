<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('点单订单详情')" />
    <style>
        .detail-card {
            border: 1px solid #e5e6e7;
            border-radius: 6px;
            background: #fafbfc;
            padding: 16px;
            margin-bottom: 16px;
        }
        .detail-card h4 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 600;
        }
        .detail-item {
            line-height: 28px;
            color: #606266;
            word-break: break-all;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content" th:object="${scanOrder}">
    <div class="detail-card">
        <h4>订单主信息</h4>
        <div class="row">
            <div class="col-sm-6 detail-item"><strong>订单ID：</strong><span th:text="*{orderId}"></span></div>
            <div class="col-sm-6 detail-item"><strong>订单号：</strong><span th:text="*{orderNo}"></span></div>
            <div class="col-sm-6 detail-item"><strong>用户ID：</strong><span th:text="*{userId}"></span></div>
            <div class="col-sm-6 detail-item"><strong>门店ID：</strong><span th:text="*{shopId}"></span></div>
            <div class="col-sm-6 detail-item"><strong>门店名称：</strong><span th:text="*{shopName} ?: '-'"></span></div>
            <div class="col-sm-6 detail-item"><strong>桌号：</strong><span th:text="*{tableNo} ?: '-'"></span></div>
            <div class="col-sm-6 detail-item"><strong>订单总金额：</strong><span th:text="*{totalAmount}"></span></div>
            <div class="col-sm-6 detail-item"><strong>实付金额：</strong><span th:text="*{payAmount}"></span></div>
            <div class="col-sm-6 detail-item"><strong>支付状态：</strong><span th:text="*{payStatus} == 1 ? '已支付' : '未支付'"></span></div>
            <div class="col-sm-6 detail-item"><strong>订单状态：</strong><span th:text="*{orderStatus} == 0 ? '待支付' : (*{orderStatus} == 1 ? '已支付/制作中' : (*{orderStatus} == 2 ? '已完成' : '已取消'))"></span></div>
            <div class="col-sm-6 detail-item"><strong>支付方式：</strong><span th:text="*{payType} ?: '-'"></span></div>
            <div class="col-sm-6 detail-item"><strong>支付时间：</strong><span th:text="${scanOrder.payTime != null ? #dates.format(scanOrder.payTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></div>
            <div class="col-sm-6 detail-item"><strong>创建时间：</strong><span th:text="${scanOrder.createTime != null ? #dates.format(scanOrder.createTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></div>
            <div class="col-sm-6 detail-item"><strong>完成时间：</strong><span th:text="${scanOrder.finishTime != null ? #dates.format(scanOrder.finishTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></div>
            <div class="col-sm-6 detail-item"><strong>取消时间：</strong><span th:text="${scanOrder.cancelTime != null ? #dates.format(scanOrder.cancelTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></div>
            <div class="col-sm-12 detail-item"><strong>备注：</strong><span th:text="*{remark} ?: '-'"></span></div>
        </div>
    </div>

    <div class="detail-card">
        <h4>订单明细</h4>
        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>商品名称</th>
                    <th>规格</th>
                    <th>价格</th>
                    <th>数量</th>
                    <th>小计</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${scanOrder.items}">
                    <td th:text="${item.productName} ?: '-'">商品名称</td>
                    <td th:text="${item.spec} ?: '-'">规格</td>
                    <td th:text="${item.price}">0.00</td>
                    <td th:text="${item.quantity}">0</td>
                    <td th:text="${item.totalPrice}">0.00</td>
                </tr>
                <tr th:if="${#lists.isEmpty(scanOrder.items)}">
                    <td colspan="5" class="text-center">暂无订单明细</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
</body>
</html>
