<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('添加充值模板')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-template-add">
            <div class="form-group">
                <label class="col-sm-3 control-label">充值金额(元)：</label>
                <div class="col-sm-8">
                    <input name="payAmount" class="form-control" type="number" step="0.01" required placeholder="请输入充值金额">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">赠送金额(元)：</label>
                <div class="col-sm-8">
                    <input name="giftAmount" class="form-control" type="number" step="0.01" value="0" placeholder="赠送金额">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">排序序号：</label>
                <div class="col-sm-8">
                    <input name="sortOrder" class="form-control" type="number" value="0" placeholder="越小越靠前">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <select name="status" class="form-control">
                        <option value="1">启用</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script>
        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(ctx + "coffee/rechargeTemplate/add", $('#form-template-add').serialize());
            }
        }
    </script>
</body>
</html>
