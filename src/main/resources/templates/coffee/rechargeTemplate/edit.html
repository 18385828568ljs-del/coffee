<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改充值模板')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-template-edit" th:object="${template}">
            <input name="templateId" th:field="*{templateId}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label">充值金额(元)：</label>
                <div class="col-sm-8">
                    <input name="payAmount" th:field="*{payAmount}" class="form-control" type="number" step="0.01" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">赠送金额(元)：</label>
                <div class="col-sm-8">
                    <input name="giftAmount" th:field="*{giftAmount}" class="form-control" type="number" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">排序序号：</label>
                <div class="col-sm-8">
                    <input name="sortOrder" th:field="*{sortOrder}" class="form-control" type="number">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <select name="status" class="form-control" th:field="*{status}">
                        <option value="1">启用</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script>
        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(ctx + "coffee/rechargeTemplate/edit", $('#form-template-edit').serialize());
            }
        }
    </script>
</body>
</html>
