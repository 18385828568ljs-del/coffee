<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('充值模板列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="coffee:rechargeTemplate:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="coffee:rechargeTemplate:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="coffee:rechargeTemplate:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('coffee:rechargeTemplate:edit')}]];
        var removeFlag = [[${@permission.hasPermi('coffee:rechargeTemplate:remove')}]];
        var prefix = ctx + "coffee/rechargeTemplate";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                modalName: "充值模板",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'templateId',
                    title: '模板ID',
                    visible: false
                },
                {
                    field: 'payAmount',
                    title: '充值金额(元)',
                    width: 130,
                    align: 'right',
                    formatter: function(v) { return '¥' + parseFloat(v).toFixed(2); }
                },
                {
                    field: 'giftAmount',
                    title: '赠送金额(元)',
                    width: 130,
                    align: 'right',
                    formatter: function(v) { return '¥' + parseFloat(v).toFixed(2); }
                },
                {
                    field: 'totalAmount',
                    title: '到账总金额(元)',
                    width: 140,
                    align: 'right',
                    formatter: function(v) { return '¥' + parseFloat(v).toFixed(2); }
                },
                {
                    field: 'sortOrder',
                    title: '排序',
                    width: 80,
                    align: 'center'
                },
                {
                    field: 'status',
                    title: '状态',
                    width: 80,
                    align: 'center',
                    formatter: function(v) {
                        return v == 1 ? '<span class="badge badge-success">启用</span>' : '<span class="badge badge-default">禁用</span>';
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    width: 160,
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push("<a class='btn btn-success btn-xs " + editFlag + "' href='javascript:void(0)' onclick=\"$.operate.edit('" + row.templateId + "')\"><i class='fa fa-edit'></i>编辑</a> ");
                        actions.push("<a class='btn btn-danger btn-xs " + removeFlag + "' href='javascript:void(0)' onclick=\"$.operate.remove('" + row.templateId + "')\"><i class='fa fa-remove'></i>删除</a>");
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
