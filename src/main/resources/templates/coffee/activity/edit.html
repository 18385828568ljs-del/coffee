<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改营销活动')" />
    <th:block th:include="include :: datetimepicker-css" />
    <style>
        .rule-panel {
            background: #f8fafc;
            border: 1px solid #e5e9f2;
            border-radius: 8px;
            padding: 16px 18px 6px;
            margin-bottom: 15px;
        }
        .rule-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #303133;
            margin-bottom: 12px;
        }
        .scope-picker {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            padding: 10px 12px 0;
            background: #fff;
        }
        .scope-option {
            display: inline-block;
            min-width: 180px;
            margin-bottom: 10px;
            margin-right: 10px;
            font-weight: normal;
        }
        .scope-option input {
            margin-right: 6px;
        }
        .help-card {
            background: #f6faff;
            border-left: 4px solid #409eff;
            padding: 10px 12px;
            color: #606266;
            line-height: 1.8;
            border-radius: 4px;
            margin-top: 8px;
        }
        .hidden-block {
            display: none;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-activity-edit" th:object="${tMarketingActivity}">
        <input name="activityId" th:field="*{activityId}" type="hidden">
        <input type="hidden" name="scopeIdsText" id="scopeIdsText" th:value="*{scopeIdsText}">
        <input type="hidden" name="effectMode" id="effectMode" th:value="*{effectMode}">

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动标题：</label>
            <div class="col-sm-8">
                <input name="title" th:field="*{title}" class="form-control" type="text" required>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动分类：</label>
            <div class="col-sm-8">
                <select name="type" id="type" class="form-control" th:field="*{type}" required>
                    <option value="1">满减活动</option>
                    <option value="2">折扣活动</option>
                    <option value="3">赠品活动</option>
                    <option value="4">包邮活动</option>
                    <option value="5">特价活动</option>
                </select>
                <span class="help-block m-b-none">商家只需要选择活动分类，下面的优惠方式会自动同步，不需要再重复选择。</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">适用场景：</label>
            <div class="col-sm-8">
                <select name="targetType" id="targetType" class="form-control" th:field="*{targetType}" required>
                    <option value="mall">仅商城（外卖/快递配送）</option>
                    <option value="scan">仅点单（堂食扫码下单）</option>
                    <option value="both">商城 + 点单（仅限全部商品）</option>
                </select>
                <span class="help-block m-b-none">两边商品 ID 互不相通，「商城+点单」只能配合「全部商品」使用。</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">适用范围：</label>
            <div class="col-sm-8">
                <select name="scopeType" id="scopeType" class="form-control" th:field="*{scopeType}" required>
                    <option value="0">全部商品</option>
                    <option value="1">指定分类</option>
                    <option value="2">指定商品</option>
                </select>
            </div>
        </div>

        <div class="form-group hidden-block" id="scopeCategoryGroup">
            <label class="col-sm-3 control-label">适用分类（商城）：</label>
            <div class="col-sm-8">
                <div class="scope-picker">
                    <label class="scope-option" th:each="item : ${categoryList}">
                        <input type="checkbox"
                               class="scope-check scope-mall-category"
                               th:value="${item.categoryId}"
                               th:checked="${tMarketingActivity.targetType != 'scan' and #strings.contains(',' + tMarketingActivity.scopeIdsText + ',', ',' + item.categoryId + ',')}">
                        <span th:text="${item.categoryName}"></span>
                    </label>
                </div>
                <span class="help-block m-b-none">勾选后，该活动只会作用在这些商城商品分类上。</span>
            </div>
        </div>

        <div class="form-group hidden-block" id="scopeProductGroup">
            <label class="col-sm-3 control-label">适用商品（商城）：</label>
            <div class="col-sm-8">
                <div class="scope-picker">
                    <label class="scope-option" th:each="item : ${productList}">
                        <input type="checkbox"
                               class="scope-check scope-mall-product"
                               th:value="${item.productId}"
                               th:checked="${tMarketingActivity.targetType != 'scan' and #strings.contains(',' + tMarketingActivity.scopeIdsText + ',', ',' + item.productId + ',')}">
                        <span th:text="${item.productName}"></span>
                    </label>
                </div>
                <span class="help-block m-b-none">勾选后，该活动只作用于这些指定商城商品。</span>
            </div>
        </div>

        <div class="form-group hidden-block" id="scopeScanCategoryGroup">
            <label class="col-sm-3 control-label">适用分类（点单）：</label>
            <div class="col-sm-8">
                <div class="scope-picker">
                    <label class="scope-option" th:each="item : ${scanCategoryList}">
                        <input type="checkbox"
                               class="scope-check scope-scan-category"
                               th:value="${item.categoryId}"
                               th:checked="${tMarketingActivity.targetType == 'scan' and #strings.contains(',' + tMarketingActivity.scopeIdsText + ',', ',' + item.categoryId + ',')}">
                        <span th:text="${item.categoryName}"></span>
                    </label>
                </div>
                <span class="help-block m-b-none">勾选后，该活动只会作用在这些点单商品分类上。</span>
            </div>
        </div>

        <div class="form-group hidden-block" id="scopeScanProductGroup">
            <label class="col-sm-3 control-label">适用商品（点单）：</label>
            <div class="col-sm-8">
                <div class="scope-picker">
                    <label class="scope-option" th:each="item : ${scanProductList}">
                        <input type="checkbox"
                               class="scope-check scope-scan-product"
                               th:value="${item.productId}"
                               th:checked="${tMarketingActivity.targetType == 'scan' and #strings.contains(',' + tMarketingActivity.scopeIdsText + ',', ',' + item.productId + ',')}">
                        <span th:text="${item.productName}"></span>
                    </label>
                </div>
                <span class="help-block m-b-none">勾选后，该活动只作用于这些指定点单商品。</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动规则：</label>
            <div class="col-sm-8">
                <div class="rule-panel">
                    <div class="rule-panel-title">触发条件</div>
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label">满多少金额可用：</label>
                                <input name="conditionMinAmount" th:value="*{conditionMinAmount}" class="form-control" type="number" min="0" step="0.01" placeholder="0 表示不限制金额">
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label">至少买几件可用：</label>
                                <input name="conditionMinQuantity" th:value="*{conditionMinQuantity}" class="form-control" type="number" min="1" step="1">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label">是否仅新用户：</label>
                                <select name="conditionNewUserOnly" class="form-control" th:field="*{conditionNewUserOnly}">
                                    <option value="0">否，所有用户都可参加</option>
                                    <option value="1">是，仅新用户可参加</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label">基础运费：</label>
                                <input name="shippingBaseFreight" th:value="*{shippingBaseFreight}" class="form-control" type="number" min="0" step="0.01" placeholder="不填时走系统默认运费">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rule-panel">
                    <div class="rule-panel-title">优惠内容</div>
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label">自动优惠方式：</label>
                                <input id="effectModeDisplay" class="form-control" type="text" readonly>
                            </div>
                        </div>
                        <div class="col-sm-6" id="effectValueGroup">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label is-required" id="effectValueLabel">优惠值：</label>
                                <input name="effectValue" id="effectValue" th:value="*{effectValue}" class="form-control" type="number" min="0" step="0.01" required>
                            </div>
                        </div>
                    </div>
                    <div class="row hidden-block" id="giftConfigGroup">
                        <div class="col-sm-8">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label is-required">赠品商品：</label>
                                <select name="giftProductId" id="giftProductId" class="form-control" th:field="*{giftProductId}">
                                    <option value="">请选择赠品商品</option>
                                    <optgroup label="商城商品" id="giftMallGroup">
                                        <option th:each="item : ${productList}" th:value="${item.productId}" th:text="${item.productName}" data-target="mall"></option>
                                    </optgroup>
                                    <optgroup label="点单商品" id="giftScanGroup">
                                        <option th:each="item : ${scanProductList}" th:value="${item.productId}" th:text="${item.productName}" data-target="scan"></option>
                                    </optgroup>
                                </select>
                                <span class="help-block m-b-none">赠品请选与「适用场景」一致的商品来源,堂食活动选点单商品,商城活动选商城商品。</span>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="form-group" style="margin-left:0;margin-right:0;">
                                <label class="control-label is-required">赠品数量：</label>
                                <input name="giftQuantity" id="giftQuantity" th:value="*{giftQuantity}" class="form-control" type="number" min="1" step="1">
                            </div>
                        </div>
                    </div>
                    <div class="help-card" id="effectModeTip"></div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">规则说明：</label>
            <div class="col-sm-8">
                <div class="help-card">系统会自动选择最优价格优惠，包邮和赠品可额外叠加。</div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control" th:field="*{status}" required>
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">开始时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input name="startTime" th:value="${#dates.format(tMarketingActivity.startTime, 'yyyy-MM-dd')}" class="form-control" placeholder="yyyy-MM-dd" type="text" required>
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required">结束时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input name="endTime" th:value="${#dates.format(tMarketingActivity.endTime, 'yyyy-MM-dd')}" class="form-control" placeholder="yyyy-MM-dd" type="text" required>
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var prefix = ctx + "coffee/activity";

    $("#form-activity-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        syncScopeIds();
        var scopeType = $("#scopeType").val();
        if (scopeType !== "0" && !$("#scopeIdsText").val()) {
            $.modal.alertWarning("请至少选择一个适用的分类或商品");
            return;
        }
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-activity-edit').serialize());
        }
    }

    function syncScopeIds() {
        var scopeType = $("#scopeType").val();
        var targetType = $("#targetType").val();
        if (scopeType === "0") {
            $("#scopeIdsText").val("");
            return;
        }
        var selector;
        if (targetType === "scan") {
            selector = scopeType === "1" ? ".scope-scan-category:checked" : ".scope-scan-product:checked";
        } else {
            selector = scopeType === "1" ? ".scope-mall-category:checked" : ".scope-mall-product:checked";
        }
        var values = [];
        $(selector).each(function() {
            values.push($(this).val());
        });
        $("#scopeIdsText").val(values.join(","));
    }

    function toggleScopePicker() {
        var targetType = $("#targetType").val();
        var scopeType = $("#scopeType").val();

        var $scopeType = $("#scopeType");
        $scopeType.find("option[value='1']").prop("disabled", targetType === "both");
        $scopeType.find("option[value='2']").prop("disabled", targetType === "both");
        if (targetType === "both" && scopeType !== "0") {
            $scopeType.val("0");
            scopeType = "0";
        }

        var showMallCategory = targetType !== "scan" && scopeType === "1";
        var showMallProduct  = targetType !== "scan" && scopeType === "2";
        var showScanCategory = targetType === "scan" && scopeType === "1";
        var showScanProduct  = targetType === "scan" && scopeType === "2";

        $("#scopeCategoryGroup").toggleClass("hidden-block", !showMallCategory);
        $("#scopeProductGroup").toggleClass("hidden-block", !showMallProduct);
        $("#scopeScanCategoryGroup").toggleClass("hidden-block", !showScanCategory);
        $("#scopeScanProductGroup").toggleClass("hidden-block", !showScanProduct);

        if (!showMallCategory) $(".scope-mall-category").prop("checked", false);
        if (!showMallProduct)  $(".scope-mall-product").prop("checked", false);
        if (!showScanCategory) $(".scope-scan-category").prop("checked", false);
        if (!showScanProduct)  $(".scope-scan-product").prop("checked", false);

        syncScopeIds();
        syncGiftProductOptions();
    }

    function syncGiftProductOptions() {
        var targetType = $("#targetType").val();
        var $select = $("#giftProductId");
        if (targetType === "mall") {
            $select.find("option[data-target='mall']").prop("disabled", false);
            $select.find("option[data-target='scan']").prop("disabled", true);
        } else {
            $select.find("option[data-target='mall']").prop("disabled", true);
            $select.find("option[data-target='scan']").prop("disabled", true);
        }
        var currentVal = $select.val();
        if (currentVal && $select.find("option[value='" + currentVal + "']").prop("disabled")) {
            $select.val("");
        }
    }

    function syncEffectModeByType() {
        var type = $("#type").val();
        var modeMap = {
            "1": "reduce",
            "2": "discount",
            "3": "gift",
            "4": "free_shipping",
            "5": "set_price"
        };
        var modeTextMap = {
            "reduce": "减固定金额",
            "discount": "打折",
            "gift": "赠送商品",
            "free_shipping": "包邮",
            "set_price": "特价"
        };
        if (modeMap[type]) {
            $("#effectMode").val(modeMap[type]);
            $("#effectModeDisplay").val(modeTextMap[modeMap[type]]);
        }
    }

    function updateEffectTips() {
        var mode = $("#effectMode").val();
        var label = "优惠值：";
        var tip = "减固定金额：例如满 200 减 30，就填优惠值 30。";
        var required = true;
        var showGift = false;
        if (mode === "discount") {
            label = "折扣值：";
            tip = "打折：例如 85 折，请填 0.85；9 折填 0.90。";
        } else if (mode === "gift") {
            label = "优惠值：";
            tip = "赠品：满足条件后自动随单赠送指定商品，赠品不会计入实付金额。";
            required = false;
            showGift = true;
        } else if (mode === "set_price") {
            label = "特价值：";
            tip = "特价：填写活动后的成交单价，例如单包特价 39.9。";
        } else if (mode === "free_shipping") {
            label = "优惠值：";
            tip = "包邮：不需要填写优惠值，只要满足上面的金额或件数条件就自动免运费。";
            required = false;
        }
        $("#effectValueLabel").text(label);
        $("#effectModeTip").text(tip);
        $("#effectValueGroup").toggleClass("hidden-block", !required);
        $("#giftConfigGroup").toggleClass("hidden-block", !showGift);
        $("#effectValue").prop("required", required);
        $("#giftProductId").prop("required", showGift);
        $("#giftQuantity").prop("required", showGift);
        if (!required) {
            $("#effectValue").val("0");
        }
        if (!showGift && !$("#giftProductId").val()) {
            $("#giftQuantity").val("1");
        }
    }

    $("#scopeType").on("change", toggleScopePicker);
    $("#targetType").on("change", toggleScopePicker);
    $(document).on("change", ".scope-check", syncScopeIds);
    $("#type").on("change", function() {
        syncEffectModeByType();
        updateEffectTips();
    });

    $("input[name='startTime']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });

    $("input[name='endTime']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });

    toggleScopePicker();
    syncEffectModeByType();
    updateEffectTips();
</script>
</body>
</html>
