<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('营销活动列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>活动标题：</label>
                                <input type="text" name="title"/>
                            </li>
                            <li>
                                <label>开始时间：</label>
                                <input type="text" class="time-input" placeholder="请选择开始时间" name="startTime"/>
                            </li>
                            <li>
                                <label>结束时间：</label>
                                <input type="text" class="time-input" placeholder="请选择结束时间" name="endTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="coffee:activity:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="coffee:activity:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="coffee:activity:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="coffee:activity:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('coffee:activity:edit')}]];
        var removeFlag = [[${@permission.hasPermi('coffee:activity:remove')}]];
        var prefix = ctx + "coffee/activity";

        function resolveScopeCount(row) {
            if (row.scopeIds && row.scopeIds.length) {
                return row.scopeIds.length;
            }
            if (!row.scopeIdsText) {
                return 0;
            }
            return row.scopeIdsText.split(",").filter(function(item) {
                return $.trim(item) !== "";
            }).length;
        }

        function formatScopeTarget(row) {
            if (row.scopeType == 0) {
                return "全部商品";
            }
            var count = resolveScopeCount(row);
            if (count <= 0) {
                return "-";
            }
            return row.scopeType == 1 ? ("已选 " + count + " 个分类") : ("已选 " + count + " 个商品");
        }

        function formatActivityRule(row) {
            var parts = [];
            if (row.conditionMinAmount && Number(row.conditionMinAmount) > 0) {
                parts.push("满 " + row.conditionMinAmount + " 元");
            }
            if (row.conditionMinQuantity && Number(row.conditionMinQuantity) > 1) {
                parts.push("至少 " + row.conditionMinQuantity + " 件");
            }
            if (Number(row.conditionNewUserOnly) === 1) {
                parts.push("仅新用户");
            }

            var effectText = "-";
            if (row.effectMode === "reduce" && row.effectValue) {
                effectText = "减 " + row.effectValue + " 元";
            } else if (row.effectMode === "discount" && row.effectValue) {
                effectText = (Number(row.effectValue) * 10) + " 折";
            } else if (row.effectMode === "gift") {
                effectText = "赠送商品 ID " + (row.giftProductId || "-") + " x " + (row.giftQuantity || 1);
            } else if (row.effectMode === "set_price" && row.effectValue) {
                effectText = "特价 " + row.effectValue + " 元";
            } else if (row.effectMode === "free_shipping") {
                effectText = "包邮";
            }

            if (effectText !== "-") {
                parts.push(effectText);
            }
            return parts.length > 0 ? parts.join("，") : "-";
        }

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "营销活动",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'activityId',
                    title: '活动ID',
                    visible: false
                },
                {
                    field: 'title',
                    title: '活动标题'
                },
                {
                    field: 'type',
                    title: '活动分类',
                    formatter: function(value) {
                        var typeMap = {
                            1: '满减活动',
                            2: '折扣活动',
                            3: '赠品活动',
                            4: '包邮活动',
                            5: '特价活动'
                        };
                        return typeMap[value] || '未定义';
                    }
                },
                {
                    field: 'scopeType',
                    title: '适用范围',
                    formatter: function(value) {
                        var scopeMap = {
                            0: '全部商品',
                            1: '指定分类',
                            2: '指定商品'
                        };
                        return scopeMap[value] || '未定义';
                    }
                },
                {
                    field: 'scopeIdsText',
                    title: '适用对象',
                    formatter: function(value, row) {
                        return formatScopeTarget(row);
                    }
                },
                {
                    field: 'effectMode',
                    title: '优惠规则',
                    formatter: function(value, row) {
                        return formatActivityRule(row);
                    }
                },
                {
                    field: 'status',
                    title: '状态',
                    formatter: function(value) {
                        return value == 1 ? '<span class="badge badge-primary">启用</span>' : '<span class="badge badge-default">禁用</span>';
                    }
                },
                {
                    field: 'startTime',
                    title: '开始时间'
                },
                {
                    field: 'endTime',
                    title: '结束时间'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.activityId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.activityId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
