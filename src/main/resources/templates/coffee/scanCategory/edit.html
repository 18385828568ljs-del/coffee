<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改点单分类')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-scanCategory-edit" th:object="${scanCategory}">
        <input name="categoryId" th:field="*{categoryId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">分类名称：</label>
            <div class="col-sm-8">
                <input name="categoryName" th:field="*{categoryName}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">分类图标：</label>
            <div class="col-sm-8">
                <input name="icon" th:field="*{icon}" class="form-control" type="text" placeholder="可填写图标地址">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="col-sm-8">
                <input name="sortOrder" th:field="*{sortOrder}" class="form-control" type="number" min="0" step="1">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control m-b">
                    <option value="1" th:selected="${scanCategory.status == 1}">启用</option>
                    <option value="0" th:selected="${scanCategory.status == 0}">停用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "coffee/scanCategory";
    $("#form-scanCategory-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-scanCategory-edit').serialize());
        }
    }
</script>
</body>
</html>
