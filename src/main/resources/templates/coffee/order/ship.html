<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('订单发货')" />
    <style>
        .order-items-panel {
            padding: 14px 16px;
            border: 1px solid #e5e6e7;
            border-radius: 6px;
            background: #fafbfc;
        }
        .order-item-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .order-item-row + .order-item-row {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed #e5e6e7;
        }
        .order-item-image,
        .order-item-image-empty {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background: #f0f2f5;
        }
        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .order-item-body {
            flex: 1;
            min-width: 0;
        }
        .order-item-name {
            font-weight: 600;
            color: #1f2d3d;
            line-height: 1.5;
            word-break: break-all;
        }
        .order-item-meta {
            margin-top: 6px;
            color: #606266;
            line-height: 1.6;
        }
        .order-item-total {
            margin-top: 6px;
            color: #8c5a32;
            font-weight: 600;
        }
        .order-items-empty {
            padding: 10px 0;
            color: #909399;
        }
    </style>
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-order-ship" th:object="${tOrder}">
            <input name="orderId" th:field="*{orderId}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label">订单号：</label>
                <div class="col-sm-8">
                    <input th:value="*{orderNo}" class="form-control" type="text" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">收货人：</label>
                <div class="col-sm-8">
                    <input th:value="*{receiverName}" class="form-control" type="text" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">收货电话：</label>
                <div class="col-sm-8">
                    <input th:value="*{receiverPhone}" class="form-control" type="text" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">收货地址：</label>
                <div class="col-sm-8">
                    <textarea class="form-control" readonly>[[*{receiverAddress}]]</textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">商品明细：</label>
                <div class="col-sm-8">
                    <div th:if="${not #lists.isEmpty(tOrder.orderItems)}" class="order-items-panel">
                        <div th:each="item : ${tOrder.orderItems}" class="order-item-row">
                            <div th:if="${item.productImg != null and item.productImg != ''}" class="order-item-image">
                                <img th:src="${item.productImg}" alt="商品图">
                            </div>
                            <div th:if="${item.productImg == null or item.productImg == ''}" class="order-item-image-empty"></div>
                            <div class="order-item-body">
                                <div class="order-item-name" th:text="${item.productName != null and item.productName != '' ? item.productName : '未知商品'}">商品名称</div>
                                <div class="order-item-meta">
                                    <div th:text="'规格：' + ${item.spec != null and item.spec != '' ? item.spec : '-'}">规格：-</div>
                                    <div th:text="'数量：x' + ${item.quantity != null ? item.quantity : 0}">数量：x1</div>
                                    <div th:text="'单价：¥' + ${item.price != null ? #numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT') : '0.00'}">单价：¥0.00</div>
                                </div>
                                <div class="order-item-total" th:text="'小计：¥' + ${item.totalPrice != null ? #numbers.formatDecimal(item.totalPrice, 1, 'COMMA', 2, 'POINT') : '0.00'}">小计：¥0.00</div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(tOrder.orderItems)}" class="order-items-empty">暂无商品明细</div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">物流单号：</label>
                <div class="col-sm-8">
                    <input name="expressNo" th:field="*{expressNo}" class="form-control" type="text" required>
                    <span class="help-block m-b-none">提交后订单会自动从“待发货”更新为“已发货”，并写入当前发货时间。</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "coffee/order";
        $("#form-order-ship").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/ship", $('#form-order-ship').serialize());
            }
        }
    </script>
</body>
</html>
