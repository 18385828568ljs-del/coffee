<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增轮播图')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-banner-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">轮播图标题：</label>
                <div class="col-sm-8">
                    <input name="bannerTitle" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">轮播图片：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="bannerImg">
                    <div class="file-loading">
                        <input class="file" id="bannerImgFile" name="file" type="file">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">跳转链接：</label>
                <div class="col-sm-8">
                    <input name="bannerUrl" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-fileinput-js" />
    <script th:inline="javascript">
        var prefix = ctx + "coffee/banner";
        $("#form-banner-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-banner-add').serialize());
            }
        }

        $("#bannerImgFile").fileinput({
            uploadUrl: ctx + "common/upload",
            maxFileCount: 1,
            autoReplace: true,
            allowedFileExtensions: ['jpg', 'jpeg', 'png', 'gif']
        }).on('fileuploaded', function(event, data, previewId, index) {
            $("input[name='bannerImg']").val(data.response.url);
        }).on('fileclear fileremoved', function() {
            $("input[name='bannerImg']").val('');
        });
    </script>
</body>
</html>
