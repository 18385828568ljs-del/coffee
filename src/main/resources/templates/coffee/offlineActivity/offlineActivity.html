<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('线下活动')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>活动标题：</label>
                            <input type="text" name="title"/>
                        </li>
                        <li>
                            <label>状态：</label>
                            <select name="status">
                                <option value="">全部</option>
                                <option value="1">上架</option>
                                <option value="0">下架</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="coffee:offlineActivity:add">
                <i class="fa fa-plus"></i> 添加
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="coffee:offlineActivity:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="coffee:offlineActivity:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('coffee:offlineActivity:edit')}]];
    var removeFlag = [[${@permission.hasPermi('coffee:offlineActivity:remove')}]];
    var signupFlag = [[${@permission.hasPermi('coffee:offlineActivity:view')}]];
    var prefix = ctx + "coffee/offlineActivity";
    var signupPrefix = ctx + "coffee/offlineActivitySignup";

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "线下活动",
            columns: [{
                checkbox: true
            },
            {
                field: 'activityId',
                title: '活动ID',
                visible: false
            },
            {
                field: 'coverImage',
                title: '封面',
                formatter: function(value) {
                    return value ? '<img src="' + value + '" style="width:88px;height:56px;object-fit:cover;border-radius:4px;" />' : '-';
                }
            },
            {
                field: 'title',
                title: '活动标题'
            },
            {
                field: 'startTime',
                title: '活动时间',
                formatter: function(value, row) {
                    return (row.startTime || '-') + '<br/>' + (row.endTime || '');
                }
            },
            {
                field: 'signupDeadline',
                title: '预约截止'
            },
            {
                field: 'location',
                title: '地点'
            },
            {
                field: 'signupCount',
                title: '预约人数',
                formatter: function(value, row) {
                    return (value || 0) + ' / ' + (row.quota || 0);
                }
            },
            {
                field: 'sortOrder',
                title: '排序'
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    return value === 1 ? '<span class="badge badge-primary">上架</span>' : '<span class="badge badge-default">下架</span>';
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-info btn-xs ' + signupFlag + '" href="javascript:void(0)" onclick="openSignup(\'' + row.activityId + '\')"><i class="fa fa-users"></i>报名</a> ');
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.activityId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.activityId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function openSignup(activityId) {
        $.modal.openTab("报名名单", signupPrefix + "/" + activityId);
    }
</script>
</body>
</html>
