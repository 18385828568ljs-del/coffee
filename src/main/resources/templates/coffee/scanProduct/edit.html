<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改点单商品')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-scanProduct-edit" th:object="${scanProduct}">
        <input name="productId" th:field="*{productId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">商品分类：</label>
            <div class="col-sm-8">
                <select name="categoryId" class="form-control m-b" required>
                    <option value="">请选择商品分类</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.categoryId}"
                            th:selected="${category.categoryId == scanProduct.categoryId}"
                            th:text="${category.categoryName}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">商品名称：</label>
            <div class="col-sm-8">
                <input name="productName" th:field="*{productName}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">副标题：</label>
            <div class="col-sm-8">
                <input name="subTitle" th:field="*{subTitle}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">商品主图：</label>
            <div class="col-sm-8">
                <input type="hidden" name="imageUrl" th:field="*{imageUrl}">
                <div class="file-loading">
                    <input class="file" id="imageUrlFile" name="file" type="file">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">商品讲解视频：</label>
            <div class="col-sm-8">
                <input type="hidden" name="videoUrl" th:field="*{videoUrl}">
                <div class="file-loading">
                    <input class="file" id="videoUrlFile" name="file" type="file">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">价格：</label>
            <div class="col-sm-8">
                <input name="price" th:field="*{price}" class="form-control" type="number" min="0" step="0.01" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">月售：</label>
            <div class="col-sm-8">
                <input name="monthSales" th:field="*{monthSales}" class="form-control" type="number" min="0" step="1">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">标签：</label>
            <div class="col-sm-8">
                <input name="tag" th:field="*{tag}" class="form-control" type="text" placeholder="如：新品 / 招牌 / 热销">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control m-b">
                    <option value="1" th:selected="${scanProduct.status == 1}">上架</option>
                    <option value="0" th:selected="${scanProduct.status == 0}">下架</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="col-sm-8">
                <input name="sortOrder" th:field="*{sortOrder}" class="form-control" type="number" min="0" step="1">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script th:inline="javascript">
    var prefix = ctx + "coffee/scanProduct";
    $("#form-scanProduct-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-scanProduct-edit').serialize());
        }
    }

    var imageUrl = [[${scanProduct.imageUrl}]];
    $("#imageUrlFile").fileinput({
        uploadUrl: ctx + 'common/upload',
        initialPreviewAsData: true,
        initialPreview: imageUrl ? [imageUrl] : [],
        maxFileCount: 1,
        autoReplace: true,
        allowedFileExtensions: ['jpg', 'jpeg', 'png', 'gif']
    }).on('fileuploaded', function (event, data) {
        $("input[name='imageUrl']").val(data.response.url);
    }).on('fileremoved', function () {
        $("input[name='imageUrl']").val('');
    });
    $("#imageUrlFile").fileinput('_initFileActions');

    var videoUrl = [[${scanProduct.videoUrl}]];
    $("#videoUrlFile").fileinput({
        uploadUrl: ctx + 'common/upload',
        initialPreviewAsData: true,
        initialPreviewFileType: 'video',
        initialPreview: videoUrl ? [videoUrl] : [],
        maxFileCount: 1,
        autoReplace: true,
        allowedFileExtensions: ['mp4', 'mov', 'm4v']
    }).on('fileuploaded', function (event, data) {
        $("input[name='videoUrl']").val(data.response.url);
    }).on('fileremoved', function () {
        $("input[name='videoUrl']").val('');
    });
    $("#videoUrlFile").fileinput('_initFileActions');
</script>
</body>
</html>
