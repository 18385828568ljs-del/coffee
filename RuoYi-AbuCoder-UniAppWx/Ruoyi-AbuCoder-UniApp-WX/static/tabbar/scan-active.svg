<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nav_scan_active" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A27A5C" />
      <stop offset="100%" stop-color="#6F4E37" />
    </linearGradient>
    <linearGradient id="nav_scan_active_dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8C6548" />
      <stop offset="100%" stop-color="#5A3F2C" />
    </linearGradient>
  </defs>
  <!-- 菜单本体(圆角卡片) -->
  <rect x="26" y="20" width="48" height="64" rx="6" ry="6" fill="url(#nav_scan_active)" />
  <!-- 顶部夹子 -->
  <rect x="40" y="14" width="20" height="10" rx="3" ry="3" fill="url(#nav_scan_active_dark)" />
  <!-- 菜单条目 -->
  <rect x="34" y="36" width="32" height="4" rx="2" ry="2" fill="rgba(255,255,255,0.85)" />
  <rect x="34" y="48" width="24" height="4" rx="2" ry="2" fill="rgba(255,255,255,0.7)" />
  <rect x="34" y="60" width="28" height="4" rx="2" ry="2" fill="rgba(255,255,255,0.7)" />
  <!-- 咖啡豆点缀 -->
  <ellipse cx="66" cy="74" rx="4" ry="6" fill="url(#nav_scan_active_dark)" />
  <path d="M 66 69 Q 66 74 66 79" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" fill="none" stroke-linecap="round" />
</svg>
